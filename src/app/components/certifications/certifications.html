<section id="certifications" class="fade-in py-20 px-6 md:px-16">
<div class="container">
  <h2 class="text-4xl text-center mb-12">Certifications</h2>

  <!-- CARDS -->
  <div class="grid md:grid-cols-3 gap-6">

    <div 
      *ngFor="let cert of certifications"
      (click)="openCert(cert)"
      class="bg-white/5 p-6 rounded-xl border border-gray-800 cursor-pointer hover:scale-105 transition"
    >
    <img src="{{ cert.logo }}" class="w-10 mb-2">
      <h3 class="text-xl font-bold">{{ cert.title }}</h3>
      <p class="text-gray-400">{{ cert.org }}</p>
      <a href="{{ cert.link }}" target="_blank" class="text-indigo-400 hover:underline">Verify</a>
    </div>

  </div>

  <!-- MODAL -->
  <div 
    *ngIf="selectedCert"
    class="fixed inset-0 bg-black/90 flex items-center justify-center z-50"
  >

    <div class="relative max-w-3xl w-full p-4">

      <!-- CLOSE -->
      <button 
        (click)="closeCert()"
        class="absolute top-2 right-4 text-white text-2xl"
      >
        ✖
      </button>

      <!-- IMAGE -->
      <img 
        [src]="selectedCert.image"
        class="w-full rounded-xl shadow-2xl"
      />

      <h3 class="text-center mt-4 text-xl">
        {{ selectedCert.title }}
      </h3>

    </div>

  </div>
</div>

</section>
