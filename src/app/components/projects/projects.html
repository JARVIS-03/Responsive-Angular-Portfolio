<section id="projects" class="fade-in py-20 px-6 md:px-16">
  <div class="container">

  <h2 class="text-4xl text-center mb-12">Projects</h2>

  <!-- PROJECT GRID -->
  <div class="grid md:grid-cols-3 gap-8">

    <div 
      *ngFor="let project of projects"
      (click)="openProject(project)"
      class="project-card bg-white/5 p-6 rounded-xl border border-gray-800 cursor-pointer hover:scale-105 transition"
    >
      <h3 class="text-xl font-bold mb-2">{{ project.title }}</h3>
      <p class="text-gray-400 mb-4">{{ project.description }}</p>
      <span class="text-indigo-400 text-sm">{{ project.tech }}</span>
    </div>

  </div>

  <!-- MODAL -->
  <div 
    *ngIf="selectedProject"
    class="fixed inset-0 bg-black/80 flex items-center justify-center z-50"
  >

    <div class="bg-gray-900 p-8 rounded-xl max-w-lg w-full relative">

      <!-- Close Button -->
      <button 
        (click)="closeProject()"
        class="absolute top-4 right-4 text-white text-xl"
      >
        ✖
      </button>

      <h3 class="text-2xl font-bold mb-4">
        {{ selectedProject.title }}
      </h3>

      <p class="text-gray-400 mb-4">
        {{ selectedProject.description }}
      </p>

      <p class="text-indigo-400 mb-6">
        {{ selectedProject.tech }}
      </p>

      <!-- ACTION BUTTONS -->
      <div class="flex gap-4">

        <a 
          [href]="selectedProject.github"
          target="_blank"
          class="px-4 py-2 bg-indigo-600 rounded hover:bg-indigo-700 transition"
        >
          GitHub
        </a>

      </div>

    </div>
  </div>
  </div>
</section>
